<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --blue:#3b82f6;
  --red:#ef4444;
  --text:#e5e7eb;
  --muted:#9aa4b2;
  --border:rgba(255,255,255,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans", sans-serif;
}

body{
  height:100vh;
  background:
    radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 45%),
    radial-gradient(circle at bottom, rgba(239,68,68,0.10), transparent 50%),
    var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* MUCH LIGHTER BACKGROUND (FAST) */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 60%);
  animation: pulseBg 6s ease-in-out infinite;
}

@keyframes pulseBg{
  0%,100%{transform:scale(1); opacity:0.5;}
  50%{transform:scale(1.05); opacity:0.2;}
}

/* MAIN CARD */
.card{
  width:min(720px, 92vw);
  padding:42px;
  border-radius:26px;
  background:rgba(11,15,26,0.9);
  border:1px solid var(--border);
  backdrop-filter: blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  position:relative;
}

/* TOP LINE */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, var(--blue), var(--red));
  opacity:0.9;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:26px;
}

.brand{
  font-size:18px;
  font-weight:800;
  letter-spacing:2px;
}

.brand span{ color:var(--blue); }

.status-pill{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  background:rgba(239,68,68,0.12);
  color:var(--red);
  border:1px solid rgba(239,68,68,0.3);
}

/* TITLE */
h1{
  font-size:40px;
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(90deg,#fff,var(--blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TEXT */
p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* LOADER (FASTER) */
.loader{
  width:58px;
  height:58px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.08);
  border-top:3px solid var(--blue);
  border-right:3px solid var(--red);
  animation:spin 0.7s linear infinite;
  margin:26px auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* INFO */
.info{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
}

.left{
  display:flex;
  gap:10px;
  align-items:center;
  font-size:14px;
  color:var(--text);
}

/* DOT (SIMPLIFIED FOR SPEED) */
.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--blue);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.5); opacity:0.4;}
}

.right{
  font-size:12px;
  color:var(--muted);
}

/* FOOTER */
.footer{
  margin-top:22px;
  font-size:11px;
  text-align:center;
  color:rgba(255,255,255,0.35);
}

/* ---------------- MOBILE LOCK ---------------- */

.mobile-block{
  display:none;
  position:fixed;
  inset:0;
  background:#05060a;
  z-index:9999;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
}

.mobile-block h2{
  font-size:22px;
  color:#fff;
}

.mobile-block p{
  color:var(--muted);
  margin-top:10px;
  font-size:13px;
}

/* show lock on small screens */
@media (max-width:768px){
  .card{
    display:none;
  }
  .mobile-block{
    display:flex;
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="brand">SYSTEM <span>CORE</span></div>
    <div class="status-pill">MAINTENANCE</div>
  </div>

  <h1>Wird gerade rebuilt</h1>

  <p>
    Die Struktur wird komplett neu aufgebaut.<br>
    Stabiler. Schneller. Moderner.
  </p>

  <div class="loader"></div>

  <div class="info">

    <div class="item">
      <div class="left"><div class="dot"></div>Backend</div>
      <div class="right">aktiv</div>
    </div>

    <div class="item">
      <div class="left"><div class="dot" style="background:var(--red)"></div>Verbindung</div>
      <div class="right">instabil</div>
    </div>

    <div class="item">
      <div class="left"><div class="dot"></div>Updates</div>
      <div class="right">läuft</div>
    </div>

  </div>

  <div class="footer">
    maintenance ui • optimized build • no dashboard
  </div>

</div>

<!-- MOBILE LOCK SCREEN -->
<div class="mobile-block">
  <h2>Zugriff blockiert</h2>
  <p>Diese Seite ist auf mobilen Geräten nicht verfügbar.</p>
</div>

</body>
</html>
