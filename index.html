<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Königsbrunn Projekt-Zentrum</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0c0e13;
    --surface: #161b24;
    --primary: #3b82f6;
    --accent: #60a5fa;
    --text-main: #f0f3f7;
    --text-muted: #8a94a6;
    --glass: rgba(22,27,36,0.75);
    --border: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans', sans-serif; background:var(--bg); color:var(--text-main); }

nav {
    position:fixed; top:0; width:100%; padding:20px 5%; display:flex; justify-content:space-between; backdrop-filter:blur(12px); background:var(--glass); border-bottom:1px solid var(--border); z-index:100;
}
.logo { font-weight:800; font-size:1.5rem; }
.logo span { color:var(--primary); }

.nav-links { display:flex; gap:30px; }
.nav-links a { color:var(--text-muted); text-decoration:none; transition:0.2s; }
.nav-links a:hover { color:var(--primary); }

.hero { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:0 10%; gap:20px; }
.hero h1 { font-size:3rem; line-height:1.2; }
.hero p { color:var(--text-muted); font-size:1.1rem; max-width:600px; }

section { padding:120px 10%; }

.card { background:var(--surface); padding:25px 30px; border-radius:15px; margin-bottom:20px; box-shadow:0 5px 20px rgba(0,0,0,0.3); }

button { cursor:pointer; border:none; border-radius:10px; padding:12px 25px; font-weight:600; transition:0.2s; }
button:hover { opacity:0.9; }
.btn-primary { background:var(--primary); color:#fff; }

.dashboard-item { margin-bottom:15px; padding:15px; border-left:4px solid var(--primary); background:var(--surface); border-radius:8px; }
.dashboard-item b { font-size:1.1rem; }

</style>
</head>
<body>

<nav>
<div class="logo">KÖNIGS<span>BRUNN</span></div>
<div class="nav-links">
<a href="#dashboard">Dashboard</a>
</div>
</nav>

<section class="hero">
<h1>Willkommen im Königsbrunn Projekt-Zentrum</h1>
<p>Alle Projekte und aktuellen Infos an einem Ort – modern, übersichtlich, direkt.</p>
</section>

<section id="dashboard">
<h2>Dashboard</h2>
<div class="card">
<button onclick="loadApps()">Daten laden</button>
<div id="list"></div>
</div>
</section>

<script>
// ===== Launch Zeit =====
const launchDate = new Date('2026-03-21T12:00:00').getTime();

// ===== Wartungsmodus UI =====
function renderMaintenance() {
    document.body.innerHTML = `
    <div id="maintenance">
        <div class="box">
            <h1>KÖNIGS<span>BRUNN</span></h1>
            <p>Neue Version wird vorbereitet</p>
            <div id="timer">Lädt...</div>
        </div>
    </div>
    `;

    const style = document.createElement("style");
    style.innerHTML = `
    #maintenance {
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: radial-gradient(circle at top, #111827, #05070a);
        color:#f8fafc;
        font-family:'Plus Jakarta Sans', sans-serif;
    }

    .box {
        text-align:center;
        background: rgba(255,255,255,0.03);
        border:1px solid rgba(255,255,255,0.08);
        padding:50px 60px;
        border-radius:20px;
        backdrop-filter: blur(15px);
        box-shadow:0 10px 40px rgba(0,0,0,0.6);
    }

    .box h1 {
        font-size:2.2rem;
        margin-bottom:10px;
    }

    .box span {
        color:#3b82f6;
    }

    .box p {
        color:#94a3b8;
        margin-bottom:25px;
    }

    #timer {
        font-size:2rem;
        font-weight:600;
        letter-spacing:1px;
    }
    `;
    document.head.appendChild(style);
}

// ===== Countdown =====
function startTimer() {
    const timerEl = document.getElementById("timer");

    const interval = setInterval(() => {
        const now = Date.now();
        const diff = launchDate - now;

        if (diff <= 0) {
            clearInterval(interval);
            location.reload();
            return;
        }

        const h = Math.floor(diff / 1000 / 60 / 60);
        const m = Math.floor((diff / 1000 / 60) % 60);
        const s = Math.floor((diff / 1000) % 60);

        timerEl.textContent =
            String(h).padStart(2, '0') + ":" +
            String(m).padStart(2, '0') + ":" +
            String(s).padStart(2, '0');
    }, 1000);
}

// ===== Aktivieren =====
if (Date.now() < launchDate) {
    renderMaintenance();
    startTimer();
}

// ===== Dashboard =====
function loadApps(){
    let list = document.getElementById("list");
    let data = JSON.parse(localStorage.getItem("apps") || "[]");
    list.innerHTML = "";
    data.reverse().forEach(a=>{
        list.innerHTML += `
        <div class="dashboard-item">
            <b>${a.discord}</b> (${a.role})<br>
            Alter: ${a.age}<br>
            Antworten: ${a.answers.join("<br><br>")}<br>
            Datum: ${a.date}
        </div>
        `;
    });
}
</script>

</body>
</html>
