<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Königsbrunn | Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ✨ NAVIGATION & LAYOUT */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            transition: 0.3s ease;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 20px;
            z-index: 10;
        }

        .hero h1, .hero p, .hero .stats, .hero .btn {
            position: relative;
            z-index: 11;
        }

        .hero p {
            opacity: 0.8;
            max-width: 500px;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.6));
            top: 0;
            left: 0;
            z-index: -1;
        }

        #particles {
            position: fixed;
            z-index: -2;
            pointer-events: none;
        }

        /* 🛠️ DARK MODE BUTTON */
        #theme-toggle.maintenance {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
            pointer-events: none;
        }

        /* 📱 MOBILE MAINTENANCE (UPGRADED VERSION) */
        .mobile-maintenance {
            display: none;
        }

        @media (max-width: 768px) {

            nav, section, footer, canvas, .bg-glow {
                display: none !important;
            }

            .mobile-maintenance {
                display: flex;
                position: fixed;
                inset: 0;
                background: linear-gradient(135deg, #050505 0%, #111 100%);
                color: white;
                z-index: 999999;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                text-align: center;
                padding: 30px;
                overflow: hidden;
            }

            .mobile-maintenance::before {
                content: "";
                position: absolute;
                width: 220px;
                height: 220px;
                background: #ffffff;
                filter: blur(140px);
                opacity: 0.08;
                top: 10%;
                left: -15%;
            }

            .mobile-maintenance::after {
                content: "";
                position: absolute;
                width: 260px;
                height: 260px;
                background: #7c5cff;
                filter: blur(160px);
                opacity: 0.10;
                bottom: 5%;
                right: -20%;
            }

            .mobile-maintenance .glass-box {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.06);
                padding: 40px 22px;
                border-radius: 28px;
                width: 100%;
                max-width: 340px;
                z-index: 2;
            }

            .mobile-maintenance h1 {
                font-size: 2.6rem;
                margin-bottom: 10px;
                letter-spacing: -1px;
                background: linear-gradient(180deg, #fff 0%, #888 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .mobile-maintenance p {
                font-size: 0.95rem;
                opacity: 0.65;
                line-height: 1.6;
                margin-bottom: 25px;
            }

            .mobile-maintenance .loader {
                width: 100%;
                height: 6px;
                background: rgba(255,255,255,0.08);
                border-radius: 50px;
                overflow: hidden;
                margin: 15px 0 25px;
                position: relative;
            }

            .mobile-maintenance .loader::after {
                content: "";
                position: absolute;
                width: 35%;
                height: 100%;
                background: linear-gradient(90deg, transparent, #7c5cff, transparent);
                animation: loading 1.8s infinite ease-in-out;
            }

            @keyframes loading {
                0% { left: -40%; }
                100% { left: 120%; }
            }

            .btn {
                display: block;
                padding: 12px;
                border-radius: 12px;
                text-decoration: none;
                font-weight: 600;
                margin-top: 10px;
            }

            .btn-main {
                background: #7c5cff;
                color: white;
            }

            .btn-secondary {
                background: rgba(255,255,255,0.06);
                color: white;
            }
        }
    </style>
</head>

<body>

<!-- 📱 MOBILE SCREEN -->
<div class="mobile-maintenance">
    <div class="glass-box">
        <h1>Königs<br><b>Brunn</b></h1>
        <div class="loader"></div>
        <p>
            <b>Mobile Modus in Arbeit.</b><br>
            Das Erlebnis wird gerade komplett optimiert.
        </p>

        <a href="https://discord.gg/DM2Au3f6RS" class="btn btn-main">
            Discord beitreten
        </a>

        <a href="/" class="btn btn-secondary">
            Zur Startseite
        </a>
    </div>
</div>

<div class="bg-glow" id="mouse-glow"></div>
<canvas id="particles"></canvas>

<nav>
    <div class="logo" onclick="window.location.href='../'">Königs<b>brunn</b></div>
    <div class="nav-right">
        <div class="nav-links">
            <a href="./">Home</a>
            <a href="../team/">Team</a>
            <a href="../tos.html">ToS</a>
            <a href="#features">Systeme</a>
        </div>
        <button id="theme-toggle" class="maintenance">🛠️ Wartung</button>
    </div>
</nav>

<section class="hero">
    <h1>Königs<br><b>Brunn</b></h1>
    <p>Eine Stadt im Aufbau. Du bist Teil davon.</p>

    <div class="stats">
        <div><h3>25+</h3><p>Bewerbungen</p></div>
        <div><h3>Team aktiv</h3><p>Status</p></div>
    </div>

    <a href="https://discord.gg/DM2Au3f6RS" class="btn btn-main">Discord Beitreten</a>
</section>

<script src="../js/app.js"></script>

<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
    });
}, { threshold: 0.1 });

document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
