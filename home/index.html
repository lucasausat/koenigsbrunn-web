<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Königsbrunn | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">

    <style>
        html { scroll-behavior: smooth; }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            transition: 0.3s ease;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            background: linear-gradient(90deg, #fff, #aaa, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s infinite linear;
        }

        @keyframes shine {
            0% { background-position: -200px; }
            100% { background-position: 200px; }
        }

        .btn-main {
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: "";
            position: absolute;
            width: 120%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            top: 0;
            left: -120%;
            transition: 0.5s;
        }

        .btn-main:hover::before {
            left: 100%;
        }

        .nav-links a { position: relative; }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: white;
            left: 0;
            bottom: -4px;
            transition: 0.3s;
        }

        .nav-links a:hover::after { width: 100%; }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 20px;
            z-index: 10;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.6));
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        #particles {
            position: fixed;
            z-index: -10;
            pointer-events: none;
        }

        .discord-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.02);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #scroll-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: white;
            z-index: 9999;
        }

        .menu-toggle { display: none; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }

            nav, section, footer, canvas, #scroll-bar, .bg-glow {
                display: none !important;
            }

            .mobile-maintenance {
                display: flex;
            }
        }

        /* MOBILE SCREEN */
        .mobile-maintenance {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            color: white;
            z-index: 999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .mobile-maintenance h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #fff, #aaa, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s infinite linear;
        }
    </style>
</head>

<body>

<div class="mobile-maintenance">
    <h1>Königs<br><b>Brunn</b></h1>
    <p>Mobile Version in Arbeit 🚧</p>
    <a href="https://discord.gg/DM2Au3f6RS" class="btn btn-main">Discord</a>
</div>

<div id="scroll-bar"></div>
<div class="bg-glow" id="mouse-glow"></div>
<canvas id="particles"></canvas>

<nav>
    <div class="logo" onclick="window.location.href='./'">Königs<b>brunn</b></div>
</nav>

<section class="hero">
    <h1>Königs<br><b>Brunn</b></h1>
    <p>Eine Stadt im Aufbau.</p>
    <a href="https://discord.gg/DM2Au3f6RS" class="btn btn-main">Discord</a>
</section>

<script>
/* Scroll */
window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    let height = document.body.scrollHeight - window.innerHeight;
    document.getElementById("scroll-bar").style.width = (scroll / height) * 100 + "%";
});

/* Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i = 0; i < 80; i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
